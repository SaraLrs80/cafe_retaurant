<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:pt="jakarta.faces.passthrough">

<ui:composition template="/WEB-INF/templates/clientLayout.xhtml">

    <ui:define name="pageTitle">Mes Réservations</ui:define>

    <ui:define name="content">

        <div class="section-header" style="margin-bottom:20px;">
            <div>
                <h2 style="font-size:1.1rem;font-weight:700;color:var(--dark);">Mes Réservations</h2>
                <p style="font-size:.8rem;color:var(--muted);margin-top:2px;">
                    Gérez vos réservations de tables
                </p>
            </div>
            <h:form>
                <h:commandButton value="+ Nouvelle réservation"
                                 action="#{clientReservationBean.nouvelleReservation}"
                                 styleClass="btn btn-primary"/>
            </h:form>
        </div>

        <h:messages globalOnly="true"
                    style="display:block;margin-bottom:16px;padding:12px 16px;
                           background:var(--green-bg);border-radius:8px;
                           color:var(--green-dark);font-size:.85rem;font-weight:500;"/>

        <div class="card">
            <table class="data-table">
                <thead>
                <tr>
                    <th>Date</th>
                    <th>Heure</th>
                    <th>Personnes</th>
                    <th>Table</th>
                    <th>Statut</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>

                <ui:repeat value="#{clientReservationBean.mesReservations}" var="r">
                    <tr>
                        <td style="font-weight:600;font-size:.88rem;">
                            <h:outputText value="#{r.dateReservationFormatted}"/>
                        </td>

                        <td style="font-size:.85rem;font-weight:500;">
                            <h:outputText value="#{r.heureReservationFormatted}"/>
                        </td>

                        <td style="text-align:center;font-size:.85rem;">
                            <h:outputText value="#{r.nombrePersonnes}"/> pers.
                        </td>

                        <td style="font-size:.85rem;">
                            Table <h:outputText value="#{r.table != null ? r.table.numeroTable : '—'}"/>
                            <ui:fragment rendered="#{r.table != null}">
                                <div style="font-size:.72rem;color:var(--muted);">
                                    <h:outputText value="#{r.table.capacite}"/> places
                                    <ui:fragment rendered="#{not empty r.table.emplacement}">
                                        · <h:outputText value="#{r.table.emplacement}"/>
                                    </ui:fragment>
                                </div>
                            </ui:fragment>
                        </td>

                        <td>
                            <span class="badge
                                #{r.statut.name() == 'CONFIRMEE'  ? 'badge-success' :
                                  r.statut.name() == 'EN_ATTENTE' ? 'badge-warning' : 'badge-danger'}">
                                <h:outputText value="#{r.statut}"/>
                            </span>
                        </td>

                        <td>
                            <h:form style="display:flex;gap:6px;">
                                <ui:fragment rendered="#{r.statut.name() == 'EN_ATTENTE'}">
                                    <h:commandButton value="Modifier"
                                                     action="#{clientReservationBean.editer(r)}"
                                                     styleClass="btn btn-secondary btn-sm"/>
                                    <h:commandButton value="Annuler"
                                                     action="#{clientReservationBean.annuler(r)}"
                                                     styleClass="btn btn-danger btn-sm"
                                                     onclick="return confirm('Annuler cette réservation ?')"/>
                                </ui:fragment>

                                <ui:fragment rendered="#{r.statut.name() == 'CONFIRMEE'}">
                                    <h:commandButton value="Annuler"
                                                     action="#{clientReservationBean.annuler(r)}"
                                                     styleClass="btn btn-danger btn-sm"
                                                     onclick="return confirm('Annuler cette réservation confirmée ?')"/>
                                </ui:fragment>

                                <ui:fragment rendered="#{r.statut.name() == 'ANNULEE'}">
                                    <span style="font-size:.75rem;color:var(--muted);">—</span>
                                </ui:fragment>
                            </h:form>
                        </td>
                    </tr>
                </ui:repeat>

                <ui:fragment rendered="#{empty clientReservationBean.mesReservations}">
                    <tr>
                        <td colspan="6">
                            <div class="empty-state">
                                <svg viewBox="0 0 24 24">
                                    <rect x="3" y="4" width="18" height="18" rx="2"/>
                                    <line x1="16" y1="2" x2="16" y2="6"/>
                                    <line x1="8" y1="2" x2="8" y2="6"/>
                                    <line x1="3" y1="10" x2="21" y2="10"/>
                                </svg>
                                <p>Vous n'avez aucune réservation</p>
                            </div>
                        </td>
                    </tr>
                </ui:fragment>

                </tbody>
            </table>
        </div>

        <ui:fragment rendered="#{clientReservationBean.showForm}">
            <div class="modal-overlay">
                <div class="modal-box">
                    <h3 class="modal-title">
                        <h:outputText value="#{clientReservationBean.modeEdition ? 'Modifier' : 'Nouvelle'} réservation"/>
                    </h3>

                    <h:form>

                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;">
                            <div class="field-group">
                                <label class="field-label">Date de réservation</label>
                                <h:inputText value="#{clientReservationBean.dateReservationStr}"
                                             styleClass="field-input"
                                             required="true"
                                             pt:type="date"/>
                            </div>

                            <div class="field-group">
                                <label class="field-label">Heure</label>
                                <h:inputText value="#{clientReservationBean.heureReservationStr}"
                                             styleClass="field-input"
                                             required="true"
                                             pt:type="time"
                                             pt:step="900"/>
                            </div>
                        </div>

                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;">
                            <div class="field-group">
                                <label class="field-label">Nombre de personnes</label>

                                <div style="display:flex;align-items:center;gap:8px;">
                                    <h:commandButton value="-"
                                                     action="#{clientReservationBean.diminuerNombrePersonnes}"
                                                     immediate="true"
                                                     styleClass="btn btn-secondary btn-sm"
                                                     style="min-width:40px;"/>

                                    <h:inputText value="#{clientReservationBean.selectedReservation.nombrePersonnes}"
                                                 styleClass="field-input"
                                                 required="true"
                                                 readonly="true"
                                                 style="text-align:center;"/>

                                    <h:commandButton value="+"
                                                     action="#{clientReservationBean.augmenterNombrePersonnes}"
                                                     immediate="true"
                                                     styleClass="btn btn-primary btn-sm"
                                                     style="min-width:40px;"/>
                                </div>
                            </div>

                            <div class="field-group">
                                <label class="field-label">Table disponible</label>
                                <h:selectOneMenu value="#{clientReservationBean.selectedReservation.table}"
                                                 converter="tableConverter"
                                                 styleClass="field-input"
                                                 required="true">
                                    <f:selectItem itemValue="#{null}"
                                                  itemLabel="— Choisir une table —"
                                                  noSelectionOption="true"/>
                                    <f:selectItems value="#{clientReservationBean.tablesCompatibles}"
                                                   var="tb"
                                                   itemValue="#{tb}"
                                                   itemLabel="Table #{tb.numeroTable} · #{tb.capacite} pers.#{not empty tb.emplacement ? ' · '.concat(tb.emplacement) : ''}"/>
                                </h:selectOneMenu>

                                <div style="font-size:.74rem;color:var(--muted);margin-top:6px;">
                                    Seules les tables adaptées au nombre de personnes sont affichées.
                                </div>
                            </div>
                        </div>

                        <div style="display:flex;gap:10px;justify-content:flex-end;">
                            <h:commandButton value="Annuler"
                                             action="#{clientReservationBean.fermerForm}"
                                             styleClass="btn btn-secondary"
                                             immediate="true"/>
                            <h:commandButton value="#{clientReservationBean.modeEdition ? 'Modifier' : 'Réserver'}"
                                             action="#{clientReservationBean.sauvegarder}"
                                             styleClass="btn btn-primary"/>
                        </div>

                    </h:form>
                </div>
            </div>
        </ui:fragment>

    </ui:define>

</ui:composition>
</html>
