<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">

<ui:composition template="/WEB-INF/templates/clientLayout.xhtml">

    <ui:define name="pageTitle">Mes Commandes</ui:define>

    <ui:define name="content">

        <!-- ══ Header ══ -->
        <div class="section-header" style="margin-bottom:20px;">
            <div>
                <h2 style="font-size:1.1rem;font-weight:700;color:var(--dark);">Mes Commandes</h2>
                <p style="font-size:.8rem;color:var(--muted);margin-top:2px;">
                    Suivez l'état de vos commandes en temps réel
                </p>
            </div>
            <div style="display:flex;gap:8px;">
                <h:form>
                    <h:selectOneMenu value="#{clientCommandeBean.filtreStatut}"
                                     styleClass="field-input"
                                     style="padding:9px 14px;border:1.5px solid var(--border);
                                            border-radius:8px;font-size:.85rem;outline:none;
                                            font-family:'DM Sans',sans-serif;">
                        <f:selectItem itemValue=""           itemLabel="Tous les statuts"/>
                        <f:selectItem itemValue="EN_ATTENTE" itemLabel="En attente"/>
                        <f:selectItem itemValue="EN_COURS"   itemLabel="En cours"/>
                        <f:selectItem itemValue="SERVIE"     itemLabel="Servie"/>
                        <f:selectItem itemValue="PAYEE"      itemLabel="Payée"/>
                        <f:selectItem itemValue="ANNULEE"    itemLabel="Annulée"/>
                    </h:selectOneMenu>
                    <h:commandButton value="Filtrer" action="#{clientCommandeBean.filtrer}"
                                     styleClass="btn btn-secondary" style="margin-left:8px;"/>
                </h:form>
                <h:link outcome="/pages/client/menu" styleClass="btn btn-primary">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    Nouvelle commande
                </h:link>
            </div>
        </div>

        <!-- ══ Table commandes ══ -->
        <div class="card">
            <table class="data-table">
                <thead>
                <tr>
                    <th>N° Commande</th>
                    <th>Date</th>
                    <th>Type</th>
                    <th>Montant</th>
                    <th>Statut</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>

                <ui:repeat value="#{clientCommandeBean.mesCommandes}" var="c">

                    <tr>

                        <td style="font-weight:700;">
                            #<h:outputText value="#{c.idCommande}"/>
                        </td>

                        <td style="font-size:.82rem;color:var(--muted);">
                            <h:outputText value="#{c.dateCommandeFormatted}"/>
                        </td>

                        <td>

<span class="badge #{c.typeCommande.name() == 'SUR_PLACE' ? 'badge-info' : 'badge-muted'}">

<h:outputText value="#{c.typeCommande.name() == 'SUR_PLACE' ? 'Sur place' : 'En ligne'}"/>

</span>

                        </td>

                        <td style="font-weight:700;color:var(--green);">

                            <h:outputText value="#{c.montantTotal}">
                                <f:convertNumber minFractionDigits="2" maxFractionDigits="2"/>
                            </h:outputText> MAD

                        </td>

                        <td>

<span class="badge
#{c.statut.name() == 'PAYEE' ? 'badge-success' :
c.statut.name() == 'EN_COURS' ? 'badge-warning' :
c.statut.name() == 'EN_ATTENTE' ? 'badge-muted' :
c.statut.name() == 'ANNULEE' ? 'badge-danger' :
'badge-info'}">

<h:outputText value="#{c.statut}"/>

</span>

                        </td>

                        <td>

                            <h:form style="display:flex;gap:6px;">

                                <h:commandButton value="Détails"
                                                 action="#{clientCommandeBean.voirDetails(c)}"
                                                 styleClass="btn btn-secondary btn-sm"/>

                                <ui:fragment rendered="#{c.statut.name() == 'EN_ATTENTE'}">

                                    <h:commandButton value="Annuler"
                                                     action="#{clientCommandeBean.annulerCommande(c)}"
                                                     styleClass="btn btn-danger btn-sm"
                                                     onclick="return confirm('Annuler cette commande ?')"/>

                                </ui:fragment>

                            </h:form>

                        </td>

                    </tr>

                </ui:repeat>

                </tbody>

            </table>
        </div>

        <!-- ══ Modal Détails commande ══ -->
        <ui:fragment rendered="#{clientCommandeBean.showDetails}">
            <div class="modal-overlay">
                <div class="modal-box">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
                        <h3 class="modal-title" style="margin-bottom:0;">
                            Commande #<h:outputText value="#{clientCommandeBean.selectedCommande.idCommande}"/>
                        </h3>
                        <h:form>
                            <h:commandButton value="✕" action="#{clientCommandeBean.fermerDetails}"
                                             styleClass="btn btn-secondary btn-sm" immediate="true"/>
                        </h:form>
                    </div>

                    <!-- Info commande -->
                    <div style="background:var(--cream);border-radius:10px;padding:14px;margin-bottom:16px;
                                 display:grid;grid-template-columns:1fr 1fr;gap:10px;">
                        <div>
                            <div style="font-size:.70rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;">Type</div>
                            <div style="font-weight:600;font-size:.88rem;margin-top:3px;">
                                <h:outputText value="#{clientCommandeBean.selectedCommande.typeCommande.name() == 'EN_LIGNE' ? 'En ligne' : 'Sur place'}"/>
                            </div>
                        </div>
                        <div>
                            <div style="font-size:.70rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;">Statut</div>
                            <div style="margin-top:3px;">
                                <span class="badge
                                    #{clientCommandeBean.selectedCommande.statut.name() == 'PAYEE'      ? 'badge-success' :
                                      clientCommandeBean.selectedCommande.statut.name() == 'EN_COURS'   ? 'badge-warning' :
                                      clientCommandeBean.selectedCommande.statut.name() == 'EN_ATTENTE' ? 'badge-muted'   :
                                      clientCommandeBean.selectedCommande.statut.name() == 'ANNULEE'    ? 'badge-danger'  : 'badge-info'}">
                                    <h:outputText value="#{clientCommandeBean.selectedCommande.statut}"/>
                                </span>
                            </div>
                        </div>
                    </div>

                    <!-- Lignes de commande -->
                    <table class="data-table" style="margin-bottom:16px;">
                        <thead>
                        <tr>
                            <th>Plat</th>
                            <th>Qté</th>
                            <th>Prix unit.</th>
                            <th>Total</th>
                        </tr>
                        </thead>
                        <tbody>
                        <ui:repeat value="#{clientCommandeBean.selectedCommande.lignes}" var="l">
                            <tr>
                                <td style="font-weight:500;"><h:outputText value="#{l.menu.nom}"/></td>
                                <td style="text-align:center;"><h:outputText value="#{l.quantite}"/></td>
                                <td>
                                    <h:outputText value="#{l.prixUnitaire}">
                                        <f:convertNumber minFractionDigits="2" maxFractionDigits="2"/>
                                    </h:outputText> MAD
                                </td><td style="font-weight:700;color:var(--green);">
                                <h:outputText value="#{l.totalLigne}">
                                    <f:convertNumber minFractionDigits="2" maxFractionDigits="2"/>
                                </h:outputText> MAD
                            </td>

                            </tr>
                        </ui:repeat>
                        </tbody>
                    </table>
                    <div style="text-align:right;font-size:1rem;font-weight:700;color:var(--dark);">
                        Total :
                        <span style="color:var(--green);font-family:'Playfair Display',serif;font-size:1.1rem;">
                            <h:outputText value="#{clientCommandeBean.selectedCommande.montantTotal}">
                                <f:convertNumber minFractionDigits="2" maxFractionDigits="2"/>
                            </h:outputText> MAD
                        </span>
                    </div>
                </div>
            </div>
        </ui:fragment>

    </ui:define>

</ui:composition>
</html>
