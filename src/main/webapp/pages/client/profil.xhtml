<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">

<ui:composition template="/WEB-INF/templates/clientLayout.xhtml">

    <ui:define name="pageTitle">Mon Profil</ui:define>

    <ui:define name="content">

        <!-- ══ Header ══ -->
        <div style="margin-bottom:24px;">
            <h2 style="font-size:1.1rem;font-weight:700;color:var(--dark);">Mon Profil</h2>
            <p style="font-size:.8rem;color:var(--muted);margin-top:2px;">
                Consultez et mettez à jour vos informations personnelles
            </p>
        </div>

        <!-- ══ Messages ══ -->
        <h:messages globalOnly="true"
                    style="display:block;margin-bottom:16px;padding:12px 16px;
                           background:var(--orange-bg);border-radius:8px;
                           color:var(--orange-dark);font-size:.85rem;font-weight:500;"/>

        <div style="display:grid;grid-template-columns:1fr 2fr;gap:20px;align-items:start;">

            <!-- ══ Carte identité ══ -->
            <div class="card" style="padding:28px;text-align:center;">

                <!-- Avatar : fond orange dégradé + initiales blanches -->
                <div style="width:80px;height:80px;border-radius:50%;
                             background:linear-gradient(135deg,#E8470A,#F28C28);
                             display:flex;align-items:center;justify-content:center;
                             font-size:1.6rem;font-weight:700;color:#FFFFFF;
                             margin:0 auto 16px;
                             box-shadow:0 6px 20px rgba(232,71,10,0.35);
                             line-height:1;letter-spacing:1px;">
                    <h:outputText value="#{authBean.currentUser.prenom.substring(0,1)}#{authBean.currentUser.nom.substring(0,1)}"/>
                </div>

                <div style="font-family:'Playfair Display',serif;font-size:1.1rem;
                             font-weight:700;color:var(--dark);">
                    <h:outputText value="#{authBean.currentUser.prenom} #{authBean.currentUser.nom}"/>
                </div>
                <div style="font-size:.78rem;color:var(--muted);margin-top:4px;">
                    <h:outputText value="#{authBean.currentUser.email}"/>
                </div>

                <!-- Badge Compte actif — vert (seul élément autorisé en vert) -->
                <div style="margin-top:14px;">
                    <span style="display:inline-flex;align-items:center;gap:5px;
                                  padding:4px 12px;border-radius:999px;
                                  background:#E8F5E9;color:#1B5E20;
                                  font-size:.72rem;font-weight:700;">
                        &#10003; Compte actif
                    </span>
                </div>

                <!-- Badge rôle — orange -->
                <div style="margin-top:8px;">
                    <span style="display:inline-block;padding:4px 12px;border-radius:999px;
                                  background:var(--orange-bg);color:var(--orange-dark);
                                  font-size:.72rem;font-weight:700;letter-spacing:.5px;">
                        CLIENT
                    </span>
                </div>
            </div>

            <!-- ══ Formulaire ══ -->
            <div class="card" style="padding:28px;">
                <div style="font-weight:700;font-size:.95rem;color:var(--dark);
                             margin-bottom:20px;padding-bottom:14px;
                             border-bottom:1px solid var(--border);">
                    Informations personnelles
                </div>
                <h:form>

                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;">
                        <div class="field-group">
                            <label class="field-label">Nom</label>
                            <h:inputText value="#{authBean.currentUser.nom}"
                                         styleClass="field-input"
                                         required="true"/>
                        </div>
                        <div class="field-group">
                            <label class="field-label">Prénom</label>
                            <h:inputText value="#{authBean.currentUser.prenom}"
                                         styleClass="field-input"
                                         required="true"/>
                        </div>
                    </div>

                    <div class="field-group" style="margin-bottom:14px;">
                        <label class="field-label">Adresse email</label>
                        <h:inputText value="#{authBean.currentUser.email}"
                                     styleClass="field-input"
                                     required="true"
                                     readonly="true"
                                     style="background:#f5f0ea;cursor:not-allowed;color:var(--muted);"/>
                        <span style="font-size:.72rem;color:var(--muted);margin-top:4px;display:block;">
                            L'email ne peut pas être modifié
                        </span>
                    </div>

                    <div class="field-group" style="margin-bottom:24px;">
                        <label class="field-label">Téléphone</label>
                        <h:inputText value="#{authBean.currentUser.telephone}"
                                     styleClass="field-input"
                                     placeholder="Ex: 0612345678"/>
                    </div>

                    <div style="display:flex;justify-content:flex-end;">
                        <h:commandButton value="Enregistrer les modifications"
                                         action="#{profilBean.sauvegarder}"
                                         styleClass="btn btn-primary"/>
                    </div>

                </h:form>
            </div>

        </div>

    </ui:define>

</ui:composition>
</html>
