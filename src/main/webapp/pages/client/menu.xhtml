<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">

<ui:composition template="/WEB-INF/templates/clientLayout.xhtml">

    <ui:define name="pageTitle">Menu du Restaurant</ui:define>

    <ui:define name="content">

        <!-- ══ Header ══ -->
        <div class="section-header" style="margin-bottom:20px;">
            <div>
                <h2 style="font-size:1.1rem;font-weight:700;color:var(--dark);">Menu de Rimberio</h2>
                <p style="font-size:.8rem;color:var(--muted);margin-top:2px;">
                    Découvrez nos plats et boissons — ajoutez au panier pour commander
                </p>
            </div>
            <h:form>
                <h:commandButton value="Mon Panier (#{clientMenuBean.nbArticlesPanier})"
                                 action="#{clientMenuBean.togglePanier}"
                                 styleClass="btn btn-primary"/>
            </h:form>
        </div>

        <!-- ══ Filtres catégorie ══ -->
        <h:form style="display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap;">
            <h:commandButton value="Tous"
                             action="#{clientMenuBean.filtrer('')}"
                             styleClass="btn #{clientMenuBean.filtreCategorie == '' ? 'btn-primary' : 'btn-secondary'}"/>
            <h:commandButton value="Entrées"
                             action="#{clientMenuBean.filtrer('ENTREE')}"
                             styleClass="btn #{clientMenuBean.filtreCategorie == 'ENTREE' ? 'btn-primary' : 'btn-secondary'}"/>
            <h:commandButton value="Plats"
                             action="#{clientMenuBean.filtrer('PLAT')}"
                             styleClass="btn #{clientMenuBean.filtreCategorie == 'PLAT' ? 'btn-primary' : 'btn-secondary'}"/>
            <h:commandButton value="Desserts"
                             action="#{clientMenuBean.filtrer('DESSERT')}"
                             styleClass="btn #{clientMenuBean.filtreCategorie == 'DESSERT' ? 'btn-primary' : 'btn-secondary'}"/>
            <h:commandButton value="Boissons"
                             action="#{clientMenuBean.filtrer('BOISSON')}"
                             styleClass="btn #{clientMenuBean.filtreCategorie == 'BOISSON' ? 'btn-primary' : 'btn-secondary'}"/>
        </h:form>

        <!-- ══ Messages ══ -->
        <h:messages globalOnly="true"
                    style="display:block;margin-bottom:16px;padding:12px 16px;
                           background:var(--orange-bg);border-radius:8px;
                           color:var(--orange-dark);font-size:.85rem;font-weight:500;"/>

        <!-- ══ Grille des plats ══ -->
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
                     gap:16px;margin-bottom:24px;">

            <ui:repeat value="#{clientMenuBean.plats}" var="p">
                <div style="background:white;border-radius:14px;overflow:hidden;
                             border:1px solid var(--border);transition:box-shadow .2s;"
                     onmouseover="this.style.boxShadow='0 6px 24px rgba(232,71,10,0.12)'"
                     onmouseout="this.style.boxShadow='none'">

                    <!-- Zone image/icone -->
                    <div style="height:160px;position:relative;background:var(--orange-bg);overflow:hidden;">

                        <!-- Si imageUrl renseignée → afficher la photo -->
                        <ui:fragment rendered="#{not empty p.imageUrl}">
                            <img src="#{p.imageUrl}" alt="#{p.nom}"
                                 style="width:100%;height:160px;object-fit:cover;display:block;"/>
                        </ui:fragment>

                        <!-- Sinon → icône SVG selon catégorie -->
                        <ui:fragment rendered="#{empty p.imageUrl}">
                            <div style="width:100%;height:100%;display:flex;
                                         align-items:center;justify-content:center;">
                                <ui:fragment rendered="#{p.categorie.name() == 'ENTREE'}">
                                    <svg width="44" height="44" viewBox="0 0 24 24" fill="none"
                                         stroke="#E8470A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z"/>
                                        <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                                        <line x1="9" y1="9" x2="9.01" y2="9"/>
                                        <line x1="15" y1="9" x2="15.01" y2="9"/>
                                    </svg>
                                </ui:fragment>
                                <ui:fragment rendered="#{p.categorie.name() == 'PLAT'}">
                                    <svg width="44" height="44" viewBox="0 0 24 24" fill="none"
                                         stroke="#E8470A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/>
                                        <line x1="7" y1="2" x2="7" y2="22"/>
                                        <path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h1v5"/>
                                    </svg>
                                </ui:fragment>
                                <ui:fragment rendered="#{p.categorie.name() == 'DESSERT'}">
                                    <svg width="44" height="44" viewBox="0 0 24 24" fill="none"
                                         stroke="#F28C28" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                                    </svg>
                                </ui:fragment>
                                <ui:fragment rendered="#{p.categorie.name() == 'BOISSON'}">
                                    <svg width="44" height="44" viewBox="0 0 24 24" fill="none"
                                         stroke="#E8470A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M18 8h1a4 4 0 0 1 0 8h-1"/>
                                        <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
                                        <line x1="6" y1="1" x2="6" y2="4"/>
                                        <line x1="10" y1="1" x2="10" y2="4"/>
                                        <line x1="14" y1="1" x2="14" y2="4"/>
                                    </svg>
                                </ui:fragment>
                            </div>
                        </ui:fragment>

                        <!-- Badge catégorie en overlay -->
                        <div style="position:absolute;top:8px;left:8px;">
                            <span style="display:inline-block;padding:3px 10px;border-radius:999px;
                                          font-size:.68rem;font-weight:700;
                                          background:rgba(255,255,255,0.92);
                                          color:var(--orange-dark);">
                                <h:outputText value="#{p.categorie}"/>
                            </span>
                        </div>
                    </div>

                    <!-- Infos plat -->
                    <div style="padding:14px;">
                        <div style="display:flex;justify-content:space-between;
                                     align-items:flex-start;margin-bottom:5px;">
                            <div style="font-weight:700;font-size:.9rem;color:var(--dark);">
                                <h:outputText value="#{p.nom}"/>
                            </div>
                            <div style="font-weight:700;color:var(--orange);font-size:.9rem;
                                         white-space:nowrap;margin-left:8px;">
                                <h:outputText value="#{p.prix}">
                                    <f:convertNumber minFractionDigits="2" maxFractionDigits="2"/>
                                </h:outputText> MAD
                            </div>
                        </div>
                        <div style="font-size:.75rem;color:var(--muted);margin-bottom:12px;
                                     line-height:1.5;height:34px;overflow:hidden;">
                            <h:outputText value="#{p.description}"/>
                        </div>
                        <h:form>
                            <h:commandButton value="+ Ajouter au panier"
                                             action="#{clientMenuBean.ajouterAuPanier(p)}"
                                             styleClass="btn btn-primary btn-sm"
                                             style="width:100%;"/>
                        </h:form>
                    </div>
                </div>
            </ui:repeat>

            <ui:fragment rendered="#{empty clientMenuBean.plats}">
                <div style="grid-column:1/-1;">
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24">
                            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                        </svg>
                        <p>Aucun plat disponible dans cette catégorie</p>
                    </div>
                </div>
            </ui:fragment>
        </div>

        <!-- ══ MODAL PANIER ══ -->
        <ui:fragment rendered="#{clientMenuBean.showPanier}">
            <div class="modal-overlay">
                <div class="modal-box">

                    <div style="display:flex;justify-content:space-between;
                                 align-items:center;margin-bottom:20px;">
                        <h3 class="modal-title" style="margin-bottom:0;">Mon Panier</h3>
                        <h:form>
                            <h:commandButton value="X"
                                             action="#{clientMenuBean.fermerPanier}"
                                             styleClass="btn btn-secondary btn-sm"
                                             immediate="true"/>
                        </h:form>
                    </div>

                    <!-- Panier vide -->
                    <ui:fragment rendered="#{empty clientMenuBean.panier}">
                        <div class="empty-state" style="padding:32px 24px;">
                            <svg viewBox="0 0 24 24">
                                <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
                                <line x1="3" y1="6" x2="21" y2="6"/>
                                <path d="M16 10a4 4 0 0 1-8 0"/>
                            </svg>
                            <p>Votre panier est vide</p>
                        </div>
                    </ui:fragment>

                    <!-- Articles -->
                    <ui:fragment rendered="#{not empty clientMenuBean.panier}">
                        <div style="display:flex;flex-direction:column;gap:10px;
                                     margin-bottom:20px;max-height:320px;overflow-y:auto;">
                            <ui:repeat value="#{clientMenuBean.panier}" var="item">
                                <div style="display:flex;align-items:center;gap:12px;
                                             padding:10px;background:var(--cream);
                                             border-radius:10px;border:1px solid var(--border);">

                                    <!-- Miniature image dans le panier -->
                                    <ui:fragment rendered="#{not empty item.menu.imageUrl}">
                                        <img src="#{item.menu.imageUrl}" alt="#{item.menu.nom}"
                                             style="width:52px;height:52px;object-fit:cover;border-radius:8px;flex-shrink:0;"/>
                                    </ui:fragment>
                                    <ui:fragment rendered="#{empty item.menu.imageUrl}">
                                        <div style="width:52px;height:52px;background:var(--orange-bg);
                                                     border-radius:8px;flex-shrink:0;display:flex;
                                                     align-items:center;justify-content:center;
                                                     font-size:1.3rem;">
                                            🍽
                                        </div>
                                    </ui:fragment>

                                    <div style="flex:1;min-width:0;">
                                        <div style="font-weight:600;font-size:.88rem;
                                                     white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
                                            <h:outputText value="#{item.menu.nom}"/>
                                        </div>
                                        <div style="font-size:.75rem;color:var(--muted);margin-top:2px;">
                                            <h:outputText value="#{item.menu.prix}">
                                                <f:convertNumber minFractionDigits="2" maxFractionDigits="2"/>
                                            </h:outputText>
                                            MAD × <h:outputText value="#{item.quantite}"/>
                                        </div>
                                    </div>

                                    <div style="display:flex;align-items:center;gap:5px;flex-shrink:0;">
                                        <h:form style="display:flex;align-items:center;gap:3px;">
                                            <h:commandButton value="-"
                                                             action="#{clientMenuBean.diminuerQuantite(item.menu.idMenu)}"
                                                             styleClass="btn btn-secondary btn-sm"
                                                             style="width:26px;height:26px;padding:0;font-size:.9rem;"/>
                                            <span style="font-weight:700;min-width:18px;
                                                          text-align:center;font-size:.85rem;">
                                                <h:outputText value="#{item.quantite}"/>
                                            </span>
                                            <h:commandButton value="+"
                                                             action="#{clientMenuBean.augmenterQuantite(item.menu.idMenu)}"
                                                             styleClass="btn btn-primary btn-sm"
                                                             style="width:26px;height:26px;padding:0;font-size:.9rem;"/>
                                        </h:form>
                                        <div style="font-weight:700;color:var(--orange);
                                                     font-size:.82rem;min-width:62px;text-align:right;">
                                            <h:outputText value="#{item.sousTotal}">
                                                <f:convertNumber minFractionDigits="2" maxFractionDigits="2"/>
                                            </h:outputText> MAD
                                        </div>
                                        <h:form>
                                            <h:commandButton value="X"
                                                             action="#{clientMenuBean.retirerDuPanier(item.menu.idMenu)}"
                                                             styleClass="btn btn-danger btn-sm"
                                                             style="width:26px;height:26px;padding:0;"/>
                                        </h:form>
                                    </div>
                                </div>
                            </ui:repeat>
                        </div>

                        <!-- Total -->
                        <div style="border-top:2px solid var(--border);
                                     padding-top:14px;margin-bottom:18px;">
                            <div style="display:flex;justify-content:space-between;align-items:center;">
                                <span style="font-weight:600;font-size:.92rem;">Total à payer</span>
                                <span style="font-family:'Playfair Display',serif;font-size:1.25rem;
                                             font-weight:700;color:var(--orange);">
                                    <h:outputText value="#{clientMenuBean.totalPanier}">
                                        <f:convertNumber minFractionDigits="2" maxFractionDigits="2"/>
                                    </h:outputText> MAD
                                </span>
                            </div>
                        </div>

                        <h:form>
                            <h:commandButton value="Confirmer la commande"
                                             action="#{clientMenuBean.validerCommande}"
                                             styleClass="btn btn-primary"
                                             style="width:100%;padding:13px;font-size:.92rem;"/>
                        </h:form>
                    </ui:fragment>

                </div>
            </div>
        </ui:fragment>

    </ui:define>

</ui:composition>
</html>
