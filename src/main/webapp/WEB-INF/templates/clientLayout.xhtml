<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">

<h:head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Rimberio — <ui:insert name="pageTitle">Espace Client</ui:insert></title>

    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&amp;family=DM+Sans:wght@300;400;500;600;700&amp;display=swap"
          rel="stylesheet"/>

    <style type="text/css">
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --orange:          #E8470A;
            --orange-mid:      #F28C28;
            --orange-light:    #FFAB76;
            --orange-bg:       #FFF3EC;
            --orange-dark:     #B83A08;
            --dark:            #1A1208;
            --cream:           #FDFAF5;
            --sidebar-bg:      #1A0C04;
            --sidebar-hover:   #2E1A0A;
            --sidebar-active:  #3D2210;
            --border:          #EDE0D4;
            --muted:           #8C6B50;
            --white:           #FFFFFF;
            --red:             #C62828;
            --green:           #2E7D32;
            --green-bg:        #E8F5E9;
        }

        html, body { height: 100%; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            color: var(--dark);
            display: flex;
            overflow: hidden;
        }

        /* ══ SIDEBAR ══ */
        .sidebar {
            width: 260px;
            min-height: 100vh;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            position: fixed;
            top: 0; left: 0; bottom: 0;
            z-index: 100;
            overflow-y: auto;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 22px 20px 18px;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            text-decoration: none;
        }

        /* ── Logo image container ── */
        .sidebar-logo-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 4px 14px rgba(232,71,10,0.40);
        }

        .sidebar-logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .sidebar-logo-text { display: flex; flex-direction: column; line-height: 1.1; }

        .sidebar-logo-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.15rem;
            font-weight: 900;
            color: white;
            letter-spacing: 0.5px;
        }

        .sidebar-logo-name span { color: var(--orange-mid); }

        .sidebar-logo-sub {
            font-size: 0.60rem;
            font-weight: 600;
            letter-spacing: 1.8px;
            text-transform: uppercase;
            color: var(--orange-light);
            margin-top: 2px;
        }

        .sidebar-section { padding: 20px 14px 0; }

        .sidebar-section-label {
            font-size: 0.60rem;
            font-weight: 700;
            letter-spacing: 1.8px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.28);
            padding: 0 8px;
            margin-bottom: 6px;
        }

        .sidebar-nav { list-style: none; display: flex; flex-direction: column; gap: 2px; }

        .sidebar-nav li a,
        .sidebar-nav li .nav-link-jsf {
            display: flex;
            align-items: center;
            gap: 11px;
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 0.88rem;
            font-weight: 500;
            color: rgba(255,255,255,0.55);
            text-decoration: none;
            transition: all 0.18s;
            cursor: pointer;
            background: transparent;
            border: none;
            width: 100%;
            font-family: 'DM Sans', sans-serif;
        }

        .sidebar-nav li a svg,
        .sidebar-nav li .nav-link-jsf svg {
            width: 17px;
            height: 17px;
            stroke-width: 2;
            flex-shrink: 0;
            opacity: 0.65;
            transition: opacity 0.18s;
        }

        .sidebar-nav li a:hover,
        .sidebar-nav li .nav-link-jsf:hover {
            background: var(--sidebar-hover);
            color: white;
        }

        .sidebar-nav li a:hover svg,
        .sidebar-nav li .nav-link-jsf:hover svg { opacity: 1; }

        .sidebar-nav li a.active,
        .sidebar-nav li .nav-link-jsf.active {
            background: var(--sidebar-active);
            color: var(--orange-light);
            font-weight: 600;
        }

        .sidebar-nav li a.active svg,
        .sidebar-nav li .nav-link-jsf.active svg {
            opacity: 1;
            stroke: var(--orange-light);
        }

        .sidebar-footer {
            margin-top: auto;
            padding: 14px;
            border-top: 1px solid rgba(255,255,255,0.07);
        }

        .sidebar-user {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            margin-bottom: 8px;
        }

        .sidebar-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--orange), var(--orange-mid));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.78rem;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
        }

        .sidebar-user-name { font-size: 0.85rem; font-weight: 600; color: white; }

        .sidebar-user-email {
            font-size: 0.68rem;
            color: rgba(255,255,255,0.38);
            margin-top: 1px;
        }

        .sidebar-logout {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 9px 12px;
            border-radius: 10px;
            background: transparent;
            border: none;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            color: rgba(255,255,255,0.45);
            width: 100%;
            text-decoration: none;
            transition: all 0.18s;
        }

        .sidebar-logout:hover {
            background: rgba(198,40,40,0.15);
            color: #EF9A9A;
        }

        /* ══ MAIN ══ */
        .main-wrapper {
            margin-left: 260px;
            flex: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(253,250,245,0.96);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .topbar-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--dark);
        }

        .topbar-right { display: flex; align-items: center; gap: 12px; }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 0.78rem;
            font-weight: 600;
            color: #2E7D32;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #4CAF50;
            border-radius: 50%;
            animation: livePulse 1.5s ease-in-out infinite;
        }

        @keyframes livePulse {
            0%,100% { opacity:1; transform:scale(1); }
            50%      { opacity:0.5; transform:scale(1.35); }
        }

        .page-content { padding: 28px 32px; flex: 1; }

        /* ══ CARDS ══ */
        .card {
            background: var(--white);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .card-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }

        .card-head-title { font-weight: 700; font-size: 0.95rem; color: var(--dark); }

        /* ══ STATS ══ */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--white);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .stat-icon svg { width: 22px; height: 22px; stroke-width: 2; fill: none; }

        .icon-orange { background: var(--orange-bg); }
        .icon-orange svg { stroke: var(--orange); }
        .icon-yellow { background: #FFF8E1; }
        .icon-yellow svg { stroke: #E65100; }
        .icon-blue { background: #E3F2FD; }
        .icon-blue svg { stroke: #1565C0; }
        .icon-dark { background: #F3EDE6; }
        .icon-dark svg { stroke: var(--dark); }

        .stat-value {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--dark);
            line-height: 1;
        }

        .stat-label { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
        .stat-info {}

        /* ══ GRID ══ */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        /* ══ TABLE ══ */
        .data-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }

        .data-table thead tr {
            background: var(--cream);
            border-bottom: 2px solid var(--border);
        }

        .data-table th {
            padding: 11px 16px;
            font-size: 0.70rem;
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: var(--muted);
            text-align: left;
        }

        .data-table tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }

        .data-table tbody tr:last-child { border-bottom: none; }
        .data-table tbody tr:hover { background: var(--cream); }
        .data-table td { padding: 12px 16px; vertical-align: middle; }

        /* ══ BADGES ══ */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 0.70rem;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .badge-success { background: var(--green-bg); color: #1B5E20; }
        .badge-warning { background: #FFF8E1; color: #E65100; }
        .badge-danger  { background: #FFEBEE; color: var(--red); }
        .badge-info    { background: #E3F2FD; color: #0D47A1; }
        .badge-muted   { background: #F5F5F5; color: #616161; }
        .badge-orange  { background: var(--orange-bg); color: var(--orange-dark); }

        /* ══ BUTTONS ══ */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 9px 18px;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--orange), var(--orange-mid));
            color: white;
            box-shadow: 0 4px 14px rgba(232,71,10,0.28);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(232,71,10,0.38);
            color: white;
        }

        .btn-secondary {
            background: var(--cream);
            color: var(--dark);
            border: 1.5px solid var(--border);
        }

        .btn-secondary:hover { background: #f0ebe0; border-color: #c8bfa8; color: var(--dark); }

        .btn-danger { background: #FFEBEE; color: var(--red); border: 1.5px solid #FFCDD2; }
        .btn-danger:hover { background: #FFCDD2; }

        .btn-sm { padding: 6px 12px; font-size: 0.78rem; border-radius: 8px; }

        /* ══ SECTION HEADER ══ */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* ══ FORM FIELDS ══ */
        .field-group { margin-bottom: 14px; }

        .field-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 5px;
            letter-spacing: 0.3px;
        }

        .field-input {
            width: 100%;
            padding: 9px 12px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            color: var(--dark);
            background: var(--cream);
            outline: none;
            transition: border-color 0.18s, box-shadow 0.18s;
        }

        .field-input:focus {
            border-color: var(--orange);
            background: white;
            box-shadow: 0 0 0 3px rgba(232,71,10,0.10);
        }

        /* ══ MODAL ══ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(26,12,4,0.55);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 300;
        }

        .modal-box {
            background: white;
            border-radius: 20px;
            padding: 32px;
            width: min(520px, 92vw);
            box-shadow: 0 24px 60px rgba(0,0,0,0.22);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: var(--dark);
            margin-bottom: 20px;
        }

        /* ══ EMPTY STATE ══ */
        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--muted);
        }

        .empty-state svg {
            width: 40px;
            height: 40px;
            stroke: var(--border);
            stroke-width: 1.5;
            fill: none;
            margin-bottom: 12px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .empty-state p { font-size: 0.88rem; }
    </style>
</h:head>

<h:body>
    <div style="display:flex;min-height:100vh;">

        <!-- ══ SIDEBAR ══ -->
        <aside class="sidebar">

            <!-- Logo avec image réelle -->
            <a href="#{request.contextPath}/" class="sidebar-logo">
                <div class="sidebar-logo-icon">
                    <h:graphicImage library="images" name="Logo.jpeg" alt="Rimberio"/>
                </div>
                <div class="sidebar-logo-text">
                    <span class="sidebar-logo-name">RIM<span>BERIO</span></span>
                    <span class="sidebar-logo-sub">Espace Client</span>
                </div>
            </a>

            <!-- PRINCIPAL -->
            <div class="sidebar-section">
                <div class="sidebar-section-label">Principal</div>
                <ul class="sidebar-nav">
                    <li>
                        <h:link outcome="/pages/client/dashboard"
                                styleClass="nav-link-jsf #{request.requestURI.contains('dashboard') ? 'active' : ''}">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <rect x="3" y="3" width="7" height="7"/>
                                <rect x="14" y="3" width="7" height="7"/>
                                <rect x="14" y="14" width="7" height="7"/>
                                <rect x="3" y="14" width="7" height="7"/>
                            </svg>
                            Tableau de bord
                        </h:link>
                    </li>
                </ul>
            </div>

            <!-- MES SERVICES -->
            <div class="sidebar-section" style="margin-top:10px;">
                <div class="sidebar-section-label">Mes Services</div>
                <ul class="sidebar-nav">
                    <li>
                        <h:link outcome="/pages/client/menu"
                                styleClass="nav-link-jsf #{request.requestURI.contains('/client/menu') ? 'active' : ''}">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                            </svg>
                            Consulter le Menu
                        </h:link>
                    </li>
                    <li>
                        <h:link outcome="/pages/client/reservations"
                                styleClass="nav-link-jsf #{request.requestURI.contains('reservations') ? 'active' : ''}">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                                <line x1="16" y1="2" x2="16" y2="6"/>
                                <line x1="8" y1="2" x2="8" y2="6"/>
                                <line x1="3" y1="10" x2="21" y2="10"/>
                            </svg>
                            Mes Réservations
                        </h:link>
                    </li>
                    <li>
                        <h:link outcome="/pages/client/commandes"
                                styleClass="nav-link-jsf #{request.requestURI.contains('commandes') ? 'active' : ''}">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
                                <line x1="3" y1="6" x2="21" y2="6"/>
                                <path d="M16 10a4 4 0 0 1-8 0"/>
                            </svg>
                            Mes Commandes
                        </h:link>
                    </li>
                </ul>
            </div>

            <!-- MON COMPTE -->
            <div class="sidebar-section" style="margin-top:10px;">
                <div class="sidebar-section-label">Mon Compte</div>
                <ul class="sidebar-nav">
                    <li>
                        <h:link outcome="/pages/client/profil"
                                styleClass="nav-link-jsf #{request.requestURI.contains('profil') ? 'active' : ''}">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                            Mon Profil
                        </h:link>
                    </li>
                </ul>
            </div>

            <!-- Footer utilisateur -->
            <div class="sidebar-footer">
                <div class="sidebar-user">
                    <div class="sidebar-avatar">
                        <h:outputText value="#{authBean.currentUser.prenom.substring(0,1)}#{authBean.currentUser.nom.substring(0,1)}"/>
                    </div>
                    <div>
                        <div class="sidebar-user-name">
                            <h:outputText value="#{authBean.currentUser.prenom} #{authBean.currentUser.nom}"/>
                        </div>
                        <div class="sidebar-user-email">
                            <h:outputText value="#{authBean.currentUser.email}"/>
                        </div>
                    </div>
                </div>
                <h:form>
                    <h:commandButton value="Se deconnecter"
                                     action="#{authBean.logout}"
                                     styleClass="sidebar-logout"/>
                </h:form>
            </div>

        </aside>

        <!-- ══ MAIN ══ -->
        <div class="main-wrapper">

            <header class="topbar">
                <div class="topbar-title">
                    <ui:insert name="pageTitle">Espace Client</ui:insert>
                </div>
                <div class="topbar-right">
                    <div class="live-indicator">
                        <div class="live-dot"/>
                        En direct
                    </div>
                </div>
            </header>

            <main class="page-content">
                <ui:insert name="content">
                    <p>Contenu de la page</p>
                </ui:insert>
            </main>

        </div>
    </div>
</h:body>
</html>
